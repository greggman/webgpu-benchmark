<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>WebGPU Benchmark</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <header>
      <h1>WebGPU Benchmark</h1>
      <p class="tagline">Measures the WebGPU implementation, not the GPU.</p>
    </header>
    <main id="app">
      <div id="unsupported" hidden>
        WebGPU is not available in this browser.
        <span id="unsupported-reason"></span>
      </div>
      <section id="panel"></section>
    </main>

    <!-- Shown only while a run is in progress: the live canvas + progress. -->
    <div id="overlay" hidden>
      <div class="overlay-card">
        <h2 id="overlay-title">Running benchmarks…</h2>
        <canvas id="view" width="640" height="360"></canvas>
        <p id="overlay-status" class="status"></p>
        <div class="progress"><div id="progress-bar"></div></div>
      </div>
    </div>

    <script type="module" src="./main.js"></script>
  </body>
</html>
